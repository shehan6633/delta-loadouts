<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Force Loadouts</title>
    <style>
        :root {
            --bg-color: #0d131a; 
            --card-bg: #141d26;
            --text-color: #ffffff;
            --accent-color: #00f0ff; 
            --gold-color: #ffd700;   
            --border-color: #1e2b38;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px; }

        header {
            text-align: center;
            padding: 60px 20px 30px 20px;
            background: linear-gradient(180deg, #172330 0%, var(--bg-color) 100%);
            border-bottom: 1px solid var(--border-color);
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .sub-title {
            font-size: 1.4rem;
            font-weight: normal;
            color: #94a3b8;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.4;
        }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        .weapon-group {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .weapon-group:hover {
            border-color: var(--accent-color);
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.1);
        }

        .weapon-header {
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .weapon-header:hover { background-color: #1a2632; }
        .weapon-header.active { border-bottom: 1px solid var(--border-color); background-color: #1a2632; }

        .weapon-title { font-size: 1.6rem; font-weight: bold; color: var(--gold-color); letter-spacing: 1px; }
        .arrow { transition: transform 0.3s; font-size: 1.2rem; color: var(--accent-color); }
        .weapon-header.active .arrow { transform: rotate(180deg); }

        .loadout-list { display: none; padding: 10px 20px; background-color: #0b1016; }

        .loadout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #141d26;
            gap: 15px;
        }

        .loadout-item:last-child { border-bottom: none; }
        .loadout-name { color: #cbd5e1; font-size: 1.1rem; font-weight: bold; }

        .copy-btn {
            background-color: var(--accent-color);
            color: #0d131a;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            min-width: 110px;
            transition: 0.2s;
        }

        .copy-btn:hover { background-color: #33f3ff; transform: scale(1.03); }
        .copy-btn.copied { background-color: #22c55e; color: #ffffff; }

        .social-links { text-align: center; margin-top: 40px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .btn-social {
            display: inline-block;
            width: 100%;
            max-width: 350px;
            color: white;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-youtube { background-color: #FF0000; }
        .btn-discord { background-color: #5865F2; }
        .btn-social:hover { opacity: 0.9; transform: translateY(-2px); }

        footer { text-align: center; margin-top: 60px; color: #475569; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="main-title">DELTA FORCE LOADOUT</div>
        <div class="sub-title">ඔයාට කැමති Weapon Loadout එකක් මෙතනින් ලේසියෙන් Copy කරගන්න</div>
    </header>

    <div class="container" id="weapons-container">

        <!-- 🔴 මෙන්න මෙතන තමයි ඔයාගේ වෙපන්ස් ලිස්ට් එක තියෙන්නේ 👇 -->
        <script>
            const loadoutData = [
                {
                    title: "AUG LOADOUT",
                    builds: [
                        { name: "300K", code: "AUG Assault Rifle-Operations-6KBE984099PEUU4LF7EHP" },
                        { name: "375K", code: "AUG Assault Rifle-Operations-6KBE9HC099PEUU4LF7EHP" },
                        { name: "420K", code: "AUG Assault Rifle-Operations-6KBE9PK099PEUU4LF7EHP" },
                        { name: "275K", code: "AUG Assault Rifle-Operations-6KBEA1K099PEUU4LF7EHP" }
                    ]
                },
                {
                    title: "M4A1 LOADOUT",
                    builds: [
                        { name: "350K", code: "M4A1-Assault Rifle-Operations-EXAMPLECODE111" },
                        { name: "400K", code: "M4A1-Assault Rifle-Operations-EXAMPLECODE222" }
                    ]
                }
                // 📝 ඉදිරියට තව වෙපන්ස් එකතු කරද්දී මෙතනින් පල්ලෙහාට කමා එකක් (,) දාලා ලියන්න.
            ];

            // වෙබ්සයිට් එකට වෙපන්ස් ටික ඉබේම ඇතුළත් කරන කොටස
            const container = document.getElementById('weapons-container');
            loadoutData.forEach((weapon, index) => {
                let buildsHtml = '';
                weapon.builds.forEach(build => {
                    buildsHtml += `
                        <div class="loadout-item">
                            <span class="loadout-name">${build.name}</span>
                            <button class="copy-btn" onclick="copyCode('${build.code}', this)">Copy Code</button>
                        </div>`;
                });

                let weaponHtml = `
                    <div class="weapon-group">
                        <div class="weapon-header" onclick="toggleWeapon(this)">
                            <div class="weapon-title">${weapon.title}</div>
                            <div class="arrow">▼</div>
                        </div>
                        <div class="loadout-list">
                            ${buildsHtml}
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', weaponHtml);
            });
        </script>
        <!-- 🔴 වෙපන්ස් ලිස්ට් එක ඉවරයි 👆 -->

        <!-- Social Links Section -->
        <div class="social-links">
            <a href="https://youtube.com/@dsm_cyberzone?si=iO3iadmzRlE9z6T2" target="_blank" class="btn-social btn-youtube">Subscribe on YouTube</a>
            <a href="https://discord.gg/24nARTqpwP" target="_blank" class="btn-social btn-discord">Join Our Discord Server</a>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Developed for Delta Force Community.</p>
    </footer>

    <script>
        function toggleWeapon(header) {
            header.classList.toggle('active');
            const list = header.nextElementSibling;
            list.style.display = list.style.display === "block" ? "none" : "block";
        }

        function copyCode(code, button) {
            navigator.clipboard.writeText(code).then(() => {
                button.innerText = "Copied!";
                button.classList.add('copied');
                setTimeout(() => {
                    button.innerText = "Copy Code";
                    button.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
